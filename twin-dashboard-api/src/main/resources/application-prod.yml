server:
  port: ${PORT:8080}

spring:
  application:
    name: twin-dashboard-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  
  # Disable Kafka in production (use HTTP endpoints instead)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# JWT Configuration  
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-minimum-32-chars-here}
  expiration: 86400000  # 24 hours

# Logging
logging:
  level:
    com.digitaltwin: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method

# Security - allow unauthenticated health checks
security:
  permit-all:
    - /actuator/health
    - /api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
