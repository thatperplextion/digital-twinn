# Prometheus configuration for Digital Twin Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Event Gateway metrics
  - job_name: 'event-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['event-gateway:8081']

  # State Engine metrics
  - job_name: 'state-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['state-engine:8082']

  # Prediction Engine metrics
  - job_name: 'prediction-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['prediction-engine:8083']

  # Anomaly Engine metrics
  - job_name: 'anomaly-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['anomaly-engine:8084']

  # Action Engine metrics
  - job_name: 'action-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['action-engine:8085']

  # Dashboard API metrics
  - job_name: 'dashboard-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['dashboard-api:8080']

  # ML Service metrics
  - job_name: 'ml-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml-service:5000']

  # Redis metrics (if using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Kafka metrics (if using kafka_exporter)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
