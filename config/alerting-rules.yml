# Digital Twin Platform - Alerting Rules
# ==========================================
# Prometheus alerting rules for monitoring

groups:
  # ==================== Service Health Alerts ====================
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (service)
          / sum(rate(http_server_requests_seconds_count[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.service }}"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "99th percentile latency is {{ $value }}s for {{ $labels.service }}"

  # ==================== Infrastructure Alerts ====================
  - name: infrastructure
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka consumer lag"
          description: "Consumer group {{ $labels.group }} has lag of {{ $value }} messages"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is at {{ $value | humanizePercentage }}"

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections running high"
          description: "{{ $value | humanizePercentage }} of max connections used"

      - alert: PostgresSlowQueries
        expr: rate(pg_stat_statements_seconds_total[5m]) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Slow queries detected in PostgreSQL"
          description: "Average query time is {{ $value }}s"

  # ==================== Digital Twin Specific Alerts ====================
  - name: digital_twin
    rules:
      - alert: HighAnomalyRate
        expr: |
          sum(rate(dt_anomalies_detected_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high anomaly detection rate"
          description: "{{ $value }} anomalies detected per second in the last 5 minutes"

      - alert: CriticalAnomaliesUnresolved
        expr: |
          sum(dt_anomalies_active{severity="CRITICAL"}) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Multiple critical anomalies unresolved"
          description: "{{ $value }} critical anomalies have been unresolved for 10+ minutes"

      - alert: ActionExecutionFailures
        expr: |
          sum(rate(dt_actions_failed_total[5m])) / sum(rate(dt_actions_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High action failure rate"
          description: "{{ $value | humanizePercentage }} of actions are failing"

      - alert: PredictionServiceDegraded
        expr: |
          histogram_quantile(0.95, sum(rate(dt_prediction_latency_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prediction service is slow"
          description: "95th percentile prediction latency is {{ $value }}s"

      - alert: EventIngestionBackpressure
        expr: |
          sum(rate(dt_events_queued_total[5m])) - sum(rate(dt_events_processed_total[5m])) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Event ingestion backpressure detected"
          description: "Events are queueing faster than they're being processed"

      - alert: TwinHealthDegraded
        expr: |
          count(dt_twin_health_score < 0.5) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Multiple twins have degraded health"
          description: "{{ $value }} twins have health score below 50%"

  # ==================== ML Service Alerts ====================
  - name: ml_service
    rules:
      - alert: MLModelPredictionErrors
        expr: |
          sum(rate(ml_predictions_errors_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML prediction errors occurring"
          description: "{{ $value }} prediction errors per second"

      - alert: MLModelLatencyHigh
        expr: |
          histogram_quantile(0.95, sum(rate(ml_prediction_latency_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML model inference is slow"
          description: "95th percentile inference latency is {{ $value }}s"
