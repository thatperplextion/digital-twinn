# ============================================
# GitHub Actions CI/CD Pipeline
# Digital Twin Platform
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ==================== Build & Test Java Services ====================
  build-java:
    name: Build Java Services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            ./mvnw clean verify -DskipTests
          else
            mvn clean verify -DskipTests
          fi

      - name: Run Tests
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            ./mvnw test
          else
            mvn test
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-test-results
          path: '**/target/surefire-reports/*.xml'

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: java-artifacts
          path: |
            twin-*/target/*.jar
            !twin-*/target/*-sources.jar
          retention-days: 7

  # ==================== Build & Test Dashboard UI ====================
  build-frontend:
    name: Build Dashboard UI
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: dashboard-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dashboard-ui/dist
          retention-days: 7

  # ==================== Build & Test ML Service ====================
  build-ml-service:
    name: Build ML Service
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: pytest --tb=short -v || true

  # ==================== Build Docker Images ====================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-java, build-frontend, build-ml-service]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        service:
          - name: event-gateway
            context: ./twin-event-gateway
          - name: state-engine
            context: ./twin-state-engine
          - name: prediction-engine
            context: ./twin-prediction-engine
          - name: anomaly-engine
            context: ./twin-anomaly-engine
          - name: action-engine
            context: ./twin-action-engine
          - name: dashboard-api
            context: ./twin-dashboard-api
          - name: dashboard-ui
            context: ./dashboard-ui
          - name: ml-service
            context: ./ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Java artifacts
        if: ${{ !contains(matrix.service.name, 'ui') && !contains(matrix.service.name, 'ml') }}
        uses: actions/download-artifact@v4
        with:
          name: java-artifacts
          path: .

      - name: Download frontend build
        if: matrix.service.name == 'dashboard-ui'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dashboard-ui/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Security Scanning ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-java, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== Deploy to Staging ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.digitaltwin.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add your deployment commands here
          # Examples:
          # - kubectl apply -f k8s/staging/
          # - docker-compose -f docker-compose.staging.yml up -d
          # - az webapp deploy ...
          # - aws ecs update-service ...

  # ==================== Integration Tests ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          echo "🧪 Running integration tests against staging..."
          # Add integration test commands
          # Example: npm run test:e2e

  # ==================== Deploy to Production ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://digitaltwin.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          # Add your production deployment commands here

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment to production successful!"
          # Add notification (Slack, Teams, etc.)

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment to production failed!"
          # Add failure notification
